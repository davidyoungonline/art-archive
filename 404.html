<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not found — davidyoung.online</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #253d75;
    --ink-light: #4566a0;
    --ink-faint: #7893bf;
    --ink-ghost: #a8bed9;
    --paper: #faf9f6;
    --paper-dark: #f0eee9;
    --serif: 'EB Garamond', 'Georgia', serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 19px; }

  body {
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  ::selection { background: #c4d0e8; color: #1a2a50; }

  .page {
    max-width: 600px;
    padding: 0 3.6rem;
    width: 100%;
  }

  .breath-mark {
    width: 1px;
    height: 0;
    background: linear-gradient(to bottom, transparent, var(--ink-ghost));
    opacity: 0;
    animation: breathIn 2.5s ease 0.5s forwards;
    margin-bottom: 3rem;
  }

  @keyframes breathIn {
    from { opacity: 0; height: 0; }
    to   { opacity: 1; height: 50px; }
  }

  .prose {
    font-family: var(--serif);
    font-size: 1.22rem;
    line-height: 1.65;
    letter-spacing: 0.015em;
    color: var(--ink);
    opacity: 0;
    animation: fadeUp 1.6s ease 1.6s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .prose p { margin-bottom: 1.8rem; }

  .nav-back {
    font-family: var(--serif);
    font-size: 0.82rem;
    color: var(--ink-faint);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 1.6s ease 1.2s forwards;
  }

  .nav-back a {
    color: var(--ink-faint);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.4s, border-color 0.4s;
  }

  .nav-back a:hover {
    color: var(--ink-light);
    border-bottom-color: var(--ink-ghost);
  }
</style>
</head>
<body>

<div class="page">

  <div class="breath-mark"></div>

  <p class="nav-back"><a href="index.html">&#8592;</a></p>

  <div class="prose">
    <p>This page doesn&rsquo;t exist &mdash; or no longer does.</p>
  </div>

</div>

</body>
</html>
